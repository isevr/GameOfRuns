<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Optimization Results</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container-fluid px-4 mt-5">

    <div class="row mb-4">
        <div class="col">
            <h2>Optimization Results</h2>
            <p class="text-muted">RunNet evaluated and completed your sequence.</p>
        </div>
    </div>

    <div class="alert {% if prediction == 'Run' %}alert-success{% else %}alert-warning{% endif %} shadow-sm" role="alert">
        <h3 class="alert-heading">Prediction: <strong>{{ prediction }}</strong></h3>
        <hr>
        <p class="mb-0">Confidence: <strong>{{ confidence }}</strong></p>
    </div>

    <div class="row mt-5">
        <div class="col">
            <h3>Completed 10-Event Sequence</h3>
            <p>Below is the full sequence, with the missing sequences optimized by the model:</p>
            
            <div class="table-responsive shadow-sm bg-white p-3 rounded">
                {{ table | safe }}
            </div>
        </div>
    </div>

    <div class="row mt-4 mb-5">
        <div class="col">
            <button onclick="window.history.back()" class="btn btn-primary">Edit Sequence</button>
            <a href="/" class="btn btn-outline-secondary ms-2">Back to Main Menu</a>
        </div>
    </div>

</body>
</html>
